<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freader Readium Shell</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #reader-container {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="reader-container"></div>
    <div id="loading">
        <h2>Freader</h2>
        <p id="status">Initializing reader...</p>
    </div>

    <script src="/assets/reader.js"></script>
    <script>
        // JS Bridge Communication
        window.updateSettings = function(settingsJson) {
            if (window.freader) {
                window.freader.updateSettings(settingsJson);
            }
        };

        // Initialize the reader
        window.initReader = function(baseUrl, initialLocator, format, manifestJson) {
            document.getElementById('status').innerText = "Loading " + format;

            if (window.freader) {
                window.freader.init(baseUrl, initialLocator, format, manifestJson);
                document.getElementById('loading').style.display = 'none';
            } else {
                 document.getElementById('status').innerText = "Error: Reader core not loaded";
            }
        };

        // Handle clicks for toggling controls
        document.body.addEventListener('click', (e) => {
            // Only toggle if not clicking a link/button
            if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
                if (window.kmpJsBridge) {
                    window.kmpJsBridge.callNative("onToggleControls", null);
                }
            }
        });
    </script>
</body>
</html>
